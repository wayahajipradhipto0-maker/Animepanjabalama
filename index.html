<!DOCTYPE html>
<html>
<head>
    <title>Anime Pajabalam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-900 text-white">
    <div class="max-w-6xl mx-auto p-4">
        <h1 class="text-3xl font-bold text-center mb-4">🔥 ANIME PAJABALAM 🔥</h1>
        <input id="search" placeholder="Cari One Piece, Naruto..." class="w-full p-3 rounded bg-gray-800 text-white mb-6" onkeyup="cariAnime()">
        <div id="list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>
<script>
let semuaAnime = [];
async function loadAnime(query = '') {
    let url = query ? `https://api.jikan.moe/v4/anime?q=${query}&limit=24` : `https://api.jikan.moe/v4/top/anime?limit=24`;
    let res = await fetch(url);
    let data = await res.json();
    semuaAnime = data.data;
    tampilkan();
}
function tampilkan() {
    document.getElementById('list').innerHTML = semuaAnime.map(a => `
        <div class="bg-gray-800 rounded-lg overflow-hidden">
            <img src="${a.images.jpg.image_url}" class="w-full h-64 object-cover">
            <div class="p-3">
                <h3 class="font-bold text-sm truncate">${a.title}</h3>
                <p class="text-yellow-400 text-xs mb-2">⭐ ${a.score || 'N/A'}</p>
                <a href="https://www.youtube.com/@MuseIndonesia/search?query=${encodeURIComponent(a.title)}" target="_blank" class="block bg-red-600 text-center py-1 rounded text-xs font-bold mb-1">Muse YT</a>
                <a href="https://www.bilibili.tv/id/search?keyword=${encodeURIComponent(a.title)}" target="_blank" class="block bg-blue-500 text-center py-1 rounded text-xs font-bold">Bstation</a>
            </div>
        </div>
    `).join('');
}
function cariAnime() {
    let q = document.getElementById('search').value;
    if(q.length > 2) loadAnime(q);
    if(q.length == 0) loadAnime();
}
loadAnime();
</script>
</body>
</html>
