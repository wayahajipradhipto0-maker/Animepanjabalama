<!DOCTYPE html>
<html>
<head>
    <title>Anime Pajabalam V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .modal { background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="max-w-7xl mx-auto p-4">
        <h1 class="text-3xl font-bold text-center mb-2">🔥 ANIME PAJABALAM V2 🔥</h1>
        <p class="text-center text-gray-400 mb-6">Katalog Legal - Klik poster buat detail</p>
        
        <div class="flex flex-wrap gap-2 mb-4">
            <input id="search" placeholder="Cari anime..." class="flex-1 p-3 rounded bg-gray-800 text-white" onkeyup="debounceCari()">
            <select id="genre" class="p-3 rounded bg-gray-800 text-white" onchange="loadAnime()">
                <option value="">Semua Genre</option>
                <option value="1">Action</option>
                <option value="2">Adventure</option>
                <option value="4">Comedy</option>
                <option value="8">Drama</option>
                <option value="10">Fantasy</option>
                <option value="22">Romance</option>
                <option value="24">Sci-Fi</option>
            </select>
        </div>
        
        <div id="loading" class="text-center py-10">Loading...</div>
        <div id="list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>

    <div id="modal" class="modal fixed inset-0 hidden items-center justify-center p-4" onclick="tutupModal()">
        <div class="bg-gray-800 max-w-2xl w-full rounded-lg p-6" onclick="event.stopPropagation()">
            <div id="modal-content"></div>
            <button onclick="tutupModal()" class="mt-4 w-full bg-red-600 py-2 rounded font-bold">Tutup</button>
        </div>
    </div>

<script>
let timeout;
async function loadAnime() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('list').innerHTML = '';
    let q = document.getElementById('search').value;
    let g = document.getElementById('genre').value;
    let url = `https://api.jikan.moe/v4/anime?limit=24&sfw=true`;
    if(q) url += `&q=${q}`;
    if(g) url += `&genres=${g}`;
    if(!q && !g) url = `https://api.jikan.moe/v4/top/anime?limit=24`;
    
    try {
        let res = await fetch(url);
        let data = await res.json();
        tampilkan(data.data);
    } catch(e) {
        document.getElementById('list').innerHTML = '<p class="col-span-full text-center">Gagal load. Coba refresh.</p>';
    }
    document.getElementById('loading').style.display = 'none';
}

function tampilkan(animeList) {
    document.getElementById('list').innerHTML = animeList.map(a => `
        <div class="bg-gray-800 rounded-lg overflow-hidden cursor-pointer hover:scale-105 transition" onclick='bukaModal(${JSON.stringify(a).replace(/'/g,"&apos;")})'>
            <img src="${a.images.jpg.image_url}" class="w-full h-64 object-cover" loading="lazy">
            <div class="p-3">
                <h3 class="font-bold text-sm truncate">${a.title}</h3>
                <p class="text-yellow-400 text-xs">⭐ ${a.score || 'N/A'}</p>
            </div>
        </div>
    `).join('');
}

function bukaModal(a) {
    document.getElementById('modal-content').innerHTML = `
        <div class="flex gap-4">
            <img src="${a.images.jpg.image_url}" class="w-32 rounded">
            <div class="flex-1">
                <h2 class="text-xl font-bold mb-2">${a.title}</h2>
                <p class="text-sm text-gray-300 mb-3">${a.synopsis ? a.synopsis.substring(0,200)+'...' : 'No synopsis'}</p>
                <p class="text-xs mb-1">⭐ Score: ${a.score || 'N/A'} | 📺 Episodes: ${a.episodes || '?'}</p>
                <div class="flex gap-2 mt-3">
                    <a href="https://www.youtube.com/@MuseIndonesia/search?query=${encodeURIComponent(a.title)}" target="_blank" class="flex-1 bg-red-600 text-center py-2 rounded text-sm font-bold">Muse YT</a>
                    <a href="https://www.bilibili.tv/id/search?keyword=${encodeURIComponent(a.title)}" target="_blank" class="flex-1 bg-blue-500 text-center py-2 rounded text-sm font-bold">Bstation</a>
                </div>
            </div>
        </div>
    `;
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal').classList.add('flex');
}

function tutupModal() {
    document.getElementById('modal').classList.add('hidden');
}

function debounceCari() {
    clearTimeout(timeout);
    timeout = setTimeout(loadAnime, 500);
}

loadAnime();
</script>
</body>
</html>
